<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiid AI · Daily Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #0a0010;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* ═══════════════════════════════
   INTRO SCREEN
═══════════════════════════════ */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: radial-gradient(ellipse at 50% 60%, #1a0035 0%, #0a0010 70%);
  transition: opacity 1.2s ease;
  overflow: hidden;
}
#intro.fade-out { opacity: 0; pointer-events: none; }

/* Starfield */
.starfield {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.star-dot {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--dur) ease var(--del) infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0; } 50% { opacity: var(--op); }
}

/* Curtain drapes left/right */
.curtain-left, .curtain-right {
  position: absolute;
  top: 0; bottom: 0;
  width: 22%;
  pointer-events: none;
}
.curtain-left {
  left: 0;
  background: linear-gradient(to right, #2a0050 0%, #1a0035 60%, transparent 100%);
}
.curtain-right {
  right: 0;
  background: linear-gradient(to left, #2a0050 0%, #1a0035 60%, transparent 100%);
}
/* Curtain fringe top */
.curtain-left::after, .curtain-right::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 120px;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 8px,
    rgba(180,100,255,.25) 8px, rgba(180,100,255,.25) 10px
  );
  opacity: .6;
}

/* Crystal ball */
.ball-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  margin-bottom: 32px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.ball-wrap svg {
  width: 200px;
  height: 200px;
  filter: drop-shadow(0 0 30px rgba(160,80,255,.7)) drop-shadow(0 0 60px rgba(210,40,135,.4));
}

/* Stand */
.ball-stand {
  width: 80px;
  height: 20px;
  background: linear-gradient(to bottom, #4a1a6a, #2a0040);
  border-radius: 4px 4px 8px 8px;
  margin: -4px auto 0;
  box-shadow: 0 4px 20px rgba(100,0,150,.5);
}
.ball-stand-base {
  width: 100px;
  height: 10px;
  background: linear-gradient(to bottom, #3a1055, #1a0030);
  border-radius: 0 0 8px 8px;
  margin: 0 auto;
  box-shadow: 0 4px 20px rgba(100,0,150,.4);
}

/* Typewriter text */
.intro-tagline {
  font-family: 'Cinzel', serif;
  font-size: clamp(.9rem, 3.5vw, 1.1rem);
  color: rgba(200,150,255,.8);
  text-align: center;
  letter-spacing: .12em;
  min-height: 1.6em;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(180,80,255,.6);
}
.intro-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 7vw, 2.6rem);
  font-weight: 700;
  text-align: center;
  line-height: 1.2;
  opacity: 0;
  animation: glowIn .8s ease 2.8s forwards;
  text-shadow: 0 0 30px rgba(210,40,135,.8), 0 0 60px rgba(129,62,175,.5);
}
.intro-title .w1 { color: white; }
.intro-title .w2 {
  background: linear-gradient(90deg, #f04fa8, #a05dd4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
@keyframes glowIn {
  from { opacity: 0; transform: scale(.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Mystic runes row */
.runes {
  display: flex;
  gap: 18px;
  margin-top: 28px;
  opacity: 0;
  animation: fadeUp .6s ease 3.4s forwards;
}
.rune {
  font-size: 1.2rem;
  color: rgba(180,100,255,.5);
  animation: runeFlicker var(--rd) ease var(--rl) infinite;
  text-shadow: 0 0 8px rgba(180,100,255,.4);
}
@keyframes runeFlicker {
  0%,100% { opacity: .3; } 50% { opacity: .9; }
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

/* Progress dots */
.intro-dots {
  display: flex;
  gap: 8px;
  margin-top: 32px;
  opacity: 0;
  animation: fadeUp .4s ease 3.2s forwards;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(180,100,255,.3);
}
.dot.active {
  background: linear-gradient(135deg, #d22887, #813eaf);
  box-shadow: 0 0 8px rgba(210,40,135,.6);
  animation: dotPulse .6s ease infinite alternate;
}
@keyframes dotPulse { to { transform: scale(1.4); opacity: .7; } }

/* ═══════════════════════════════
   MAIN SCREEN
═══════════════════════════════ */
#main {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 48px;
  opacity: 0;
  transition: opacity .8s ease;
  min-height: 100vh;
  background: #1e1525;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(129,62,175,.35) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(210,40,135,.2) 0%, transparent 50%);
}
#main.visible { opacity: 1; }

.logo-wrap { display:flex;flex-direction:column;align-items:center;margin-bottom:10px; }
h1 { font-size:clamp(2rem,9vw,2.8rem);font-weight:900;color:white;text-align:center;margin-bottom:6px;line-height:1.1; }
h1 span { background:linear-gradient(90deg,#f04fa8,#a05dd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.sub { font-size:.9rem;color:rgba(255,255,255,.4);text-align:center;margin-bottom:24px; }
.hint { font-size:12px;color:rgba(255,255,255,.3);display:flex;align-items:center;gap:6px;margin-bottom:14px; }
.pulse { width:6px;height:6px;border-radius:50%;background:#d22887;animation:p 1.8s ease-in-out infinite; }
@keyframes p { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.card-back { width:340px;height:560px;background:#120d1e;border:2px solid rgba(210,40,135,.5);border-radius:24px;cursor:pointer;box-shadow:0 24px 60px rgba(129,62,175,.4);overflow:hidden; }
.card-back svg { width:340px;height:560px;display:block; }
.card-front { width:340px;display:none;flex-direction:column;border-radius:24px;overflow:hidden;box-shadow:0 24px 60px rgba(129,62,175,.4);border:2px solid rgba(255,255,255,.12);background:#0e0818; }
.card-topbar { height:5px;background:linear-gradient(90deg,#d22887,#813eaf);flex-shrink:0; }
.card-label { font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);text-align:center;padding:10px 16px 0;flex-shrink:0; }
.card-img-wrap { position:relative;width:100%;height:320px;flex-shrink:0;overflow:hidden; }
.card-img-wrap img { width:100%;height:320px;object-fit:cover;display:block; }
.card-img-wrap::after { content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,#0e0818,transparent);pointer-events:none; }
.card-name { font-size:32px;font-weight:900;color:white;text-align:left;padding:10px 18px 6px;line-height:1.1;flex-shrink:0; }
.card-divider { height:1px;background:rgba(255,255,255,.08);margin:0 18px;flex-shrink:0; }
.card-reading { padding:14px 18px 18px;flex-shrink:0; }
.reading-lbl { font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;background:linear-gradient(90deg,#f04fa8,#a05dd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:8px; }
.reading-txt { font-size:.86rem;line-height:1.65;color:rgba(255,255,255,.7);text-align:center;margin-bottom:12px; }
.kws { display:flex;gap:6px;justify-content:center;flex-wrap:wrap; }
.kw { font-size:10px;font-weight:700;padding:5px 14px;border-radius:100px;background:rgba(210,40,135,.2);color:#f04fa8;border:1px solid rgba(210,40,135,.45); }
.btn { background:linear-gradient(135deg,#d22887,#9b3dd4);color:white;font-family:'Inter',sans-serif;font-size:16px;font-weight:800;border:none;border-radius:100px;padding:16px 32px;cursor:pointer;width:100%;max-width:340px;margin-top:18px;display:none;-webkit-appearance:none;touch-action:manipulation;box-shadow:0 8px 32px rgba(210,40,135,.4); }
.btn:active { opacity:.88;transform:scale(.98); }
</style>
</head>

<!-- ══ INTRO ══ -->
<div id="intro">
  <div class="starfield" id="starfield"></div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>

  <!-- Crystal ball SVG -->
  <div class="ball-wrap">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ballGrad" cx="38%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#e8d0ff"/>
          <stop offset="25%" stop-color="#b06eff"/>
          <stop offset="55%" stop-color="#5a0f9e"/>
          <stop offset="80%" stop-color="#2a0050"/>
          <stop offset="100%" stop-color="#0d0020"/>
        </radialGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#a050ff" stop-opacity=".6"/>
          <stop offset="100%" stop-color="#a050ff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="innerMist" cx="50%" cy="60%" r="45%">
          <stop offset="0%" stop-color="#d22887" stop-opacity=".35"/>
          <stop offset="50%" stop-color="#813eaf" stop-opacity=".2"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
        <filter id="blur2"><feGaussianBlur stdDeviation="6"/></filter>
        <clipPath id="ballClip"><circle cx="100" cy="100" r="88"/></clipPath>
      </defs>

      <!-- Outer glow -->
      <circle cx="100" cy="100" r="98" fill="url(#glowGrad)" filter="url(#blur2)"/>

      <!-- Main ball -->
      <circle cx="100" cy="100" r="88" fill="url(#ballGrad)"/>

      <!-- Inner mist swirl -->
      <g clip-path="url(#ballClip)">
        <ellipse cx="100" cy="120" rx="60" ry="40" fill="url(#innerMist)" filter="url(#blur1)">
          <animateTransform attributeName="transform" type="rotate" from="0 100 120" to="360 100 120" dur="8s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="100" cy="110" rx="45" ry="28" fill="#d22887" opacity=".12" filter="url(#blur2)">
          <animateTransform attributeName="transform" type="rotate" from="360 100 110" to="0 100 110" dur="5s" repeatCount="indefinite"/>
        </ellipse>

        <!-- Floating mystical symbols inside ball -->
        <text x="72" y="95" font-size="14" fill="rgba(200,150,255,.4)" font-family="serif">
          ✦
          <animate attributeName="opacity" values=".1;.6;.1" dur="2.3s" repeatCount="indefinite"/>
        </text>
        <text x="108" y="118" font-size="11" fill="rgba(210,40,135,.5)" font-family="serif">
          ☽
          <animate attributeName="opacity" values=".2;.7;.2" dur="3.1s" repeatCount="indefinite"/>
        </text>
        <text x="84" y="128" font-size="10" fill="rgba(160,100,255,.4)" font-family="serif">
          ★
          <animate attributeName="opacity" values=".1;.5;.1" dur="1.9s" repeatCount="indefinite"/>
        </text>

        <!-- Scan line animation -->
        <rect x="12" y="0" width="176" height="3" fill="rgba(200,150,255,.08)" filter="url(#blur1)">
          <animate attributeName="y" values="20;180;20" dur="4s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- Shine highlight -->
      <ellipse cx="72" cy="65" rx="28" ry="18" fill="white" opacity=".18" filter="url(#blur1)"/>
      <ellipse cx="64" cy="58" rx="12" ry="8" fill="white" opacity=".28" filter="url(#blur1)"/>

      <!-- Ball rim -->
      <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(180,100,255,.35)" stroke-width="1.5"/>
    </svg>
  </div>

  <div class="ball-stand"></div>
  <div class="ball-stand-base"></div>

  <!-- Typewriter tagline -->
  <div class="intro-tagline" id="typewriter"></div>

  <!-- Title -->
  <div class="intro-title">
    <span class="w1">Your </span><span class="w2">Daily Card</span>
  </div>

  <!-- Rune row -->
  <div class="runes">
    <span class="rune" style="--rd:2.1s;--rl:.0s">☿</span>
    <span class="rune" style="--rd:2.7s;--rl:.3s">♄</span>
    <span class="rune" style="--rd:1.9s;--rl:.6s">✦</span>
    <span class="rune" style="--rd:3.1s;--rl:.2s">♃</span>
    <span class="rune" style="--rd:2.4s;--rl:.5s">☽</span>
    <span class="rune" style="--rd:2.0s;--rl:.1s">♀</span>
    <span class="rune" style="--rd:2.8s;--rl:.4s">✦</span>
  </div>

  <!-- Progress dots -->
  <div class="intro-dots">
    <div class="dot active" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
</div>

<script>
// Starfield
(function() {
  var sf = document.getElementById('starfield');
  for (var i = 0; i < 80; i++) {
    var el = document.createElement('div');
    el.className = 'star-dot';
    var sz = Math.random() * 2.5 + .5;
    el.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--dur:'+(Math.random()*4+2)+'s;--del:'+(Math.random()*4)+'s;--op:'+(Math.random()*.7+.1);
    sf.appendChild(el);
  }
})();

// Typewriter
var phrases = ['The stars are aligned...', 'The cards await...', 'Seek your truth...'];
var pi = 0, ci = 0, txt = '';
var tw = document.getElementById('typewriter');
function type() {
  var phrase = phrases[pi % phrases.length];
  if (ci < phrase.length) {
    txt += phrase[ci++];
    tw.textContent = txt;
    setTimeout(type, 65);
  } else {
    setTimeout(function() {
      // erase
      function erase() {
        if (txt.length > 0) {
          txt = txt.slice(0, -1);
          tw.textContent = txt;
          setTimeout(erase, 35);
        } else {
          ci = 0; pi++;
          setTimeout(type, 400);
        }
      }
      erase();
    }, 1400);
  }
}
setTimeout(type, 600);

// Progress dots
setTimeout(function() {
  document.getElementById('d1').classList.remove('active');
  document.getElementById('d2').classList.add('active');
}, 1500);
setTimeout(function() {
  document.getElementById('d2').classList.remove('active');
  document.getElementById('d3').classList.add('active');
}, 3000);

// Transition to main
setTimeout(function() {
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(function() {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('main').classList.add('visible');
  }, 1200);
}, 4500);

// Card logic
var CARDS = [
  {id:'fool',label:'THE FOOL · 0',name:'The Fool',kws:["new beginnings", "freedom", "leap of faith"],reading:'A fresh adventure is calling your name. The universe is giving you full permission to leap — don\'t let fear talk you out of something beautiful.'},
  {id:'lovers',label:'THE LOVERS · VI',name:'The Lovers',kws:["connection", "choice", "alignment"],reading:'A meaningful choice is in front of you. Follow what your heart already knows — alignment between your values and your actions is everything right now.'},
  {id:'star',label:'THE STAR · XVII',name:'The Star',kws:["hope", "healing", "renewal"],reading:'After the storm, you shine. You are held, guided, and worthy of good things. Breathe. Renewal is already underway.'},
  {id:'moon',label:'THE MOON · XVIII',name:'The Moon',kws:["intuition", "dreams", "mystery"],reading:'Trust your gut — even when the path looks blurry. Your subconscious is smarter than your doubts. Navigate by feeling, not just by facts.'},
  {id:'sun',label:'THE SUN · XIX',name:'The Sun',kws:["joy", "confidence", "vitality"],reading:'Today is yours. Stop shrinking — your energy is magnetic right now. Show up fully and watch what opens up.'},
  {id:'wheel',label:'WHEEL OF FORTUNE · X',name:'Wheel of Fortune',kws:["cycles", "turning point", "luck"],reading:'The wheel is turning in your favour. What felt stuck is beginning to move. Stay flexible — the shift you have been waiting for is already in motion.'},
  {id:'world',label:'THE WORLD · XXI',name:'The World',kws:["completion", "wholeness", "achievement"],reading:'You have arrived. Honour how far you have come. This is a moment of real fullness — let yourself feel it completely.'},
  {id:'magician',label:'THE MAGICIAN · I',name:'The Magician',kws:["manifestation", "power", "willpower"],reading:'Everything you need is already in your hands. Stop waiting for permission — your ideas, your drive, your skills are enough. Begin.'}
];
var current=null,lastIndex=-1,revealed=false;
function pickCard(){{var i;do{{i=Math.floor(Math.random()*CARDS.length);}}while(i===lastIndex&&CARDS.length>1);lastIndex=i;current=CARDS[i];}}
function reveal(){{
  if(revealed)return;revealed=true;
  document.getElementById('card-img').src='images/'+current.id+'.png';
  document.getElementById('card-img').alt=current.name;
  document.getElementById('card-label').textContent=current.label;
  document.getElementById('card-name').textContent=current.name;
  document.getElementById('reading-txt').textContent=current.reading;
  document.getElementById('card-kws').innerHTML=current.kws.map(function(k){{return'<span class="kw">'+k+'</span>';}}).join('');
  document.getElementById('card-back').style.display='none';
  document.getElementById('card-front').style.display='flex';
  document.getElementById('hint').style.display='none';
  document.getElementById('btn-row').classList.add('show');
}}
function redraw(){{
  revealed=false;pickCard();
  document.getElementById('card-back').style.display='block';
  document.getElementById('card-front').style.display='none';
  document.getElementById('hint').style.display='flex';
  document.getElementById('btn-row').classList.remove('show');
}}
pickCard();

function shareCard() {
  var txt = current.name + ' — ' + current.reading + ' #KiidAI #DailyTarot';
  if (navigator.share) {
    navigator.share({ title: 'My Daily Tarot — ' + current.name, text: txt, url: window.location.href });
  } else {
    navigator.clipboard && navigator.clipboard.writeText(txt).then(function() {
      alert('Reading copied to clipboard!');
    });
  }
}
</script>
