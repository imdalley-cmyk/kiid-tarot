<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiid AI – What's Your Color Season?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Quicksand', sans-serif;
  }

  .card {
    width: 390px;
    background: radial-gradient(ellipse at top, #3d1f4e 0%, #1e1028 50%, #150d20 100%);
    border-radius: 32px;
    padding: 28px 24px 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  /* Animated bg sparkles */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    animation: fadeDown 0.7s ease both;
  }
  .logo-icon {
    width: 38px; height: 38px;
    animation: spinBounce 3s ease-in-out infinite;
  }
  @keyframes spinBounce {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-8deg) scale(1.1); }
    75% { transform: rotate(8deg) scale(1.1); }
  }
  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: white;
    letter-spacing: -0.5px;
  }

  /* Badge */
  .free-badge {
    position: absolute;
    top: 88px;
    left: 14px;
    width: 68px; height: 68px;
    background: linear-gradient(135deg, #ff4dac, #e91e8c);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(255,77,172,0.5);
    animation: badgeWobble 2s ease-in-out infinite;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    width: 76px; height: 76px;
  }
  @keyframes badgeWobble {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.08); }
  }
  .free-badge span {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 11px;
    color: white;
    line-height: 1.2;
    text-align: center;
  }

  /* Seasons grid */
  .seasons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .season-panel {
    position: relative;
    height: 280px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .season-panel.summer { background: linear-gradient(180deg, #a8d8ea 0%, #ffd6e0 100%); }
  .season-panel.fall   { background: linear-gradient(180deg, #f4a261 0%, #e76f51 100%); }
  .season-panel.winter { background: linear-gradient(180deg, #b8d4e8 0%, #e8f4f8 100%); }

  .season-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 1px;
    text-align: center;
    padding: 8px 4px 4px;
    color: #333;
  }
  .season-panel.winter .season-label { color: #2c5282; }

  .season-img {
    width: 100%;
    flex: 1;
    object-fit: cover;
    object-position: top center;
  }

  /* Floating particles per season */
  .particle {
    position: absolute;
    pointer-events: none;
    font-size: 14px;
    animation: floatUp var(--dur, 3s) var(--delay, 0s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(20px) rotate(0deg); }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-80px) rotate(360deg); }
  }

  /* Snowflakes */
  .snowflake {
    position: absolute;
    color: white;
    font-size: 12px;
    animation: snowFall var(--dur, 3s) var(--delay, 0s) linear infinite;
    opacity: 0;
  }
  @keyframes snowFall {
    0% { opacity: 0; transform: translateY(-10px) translateX(0px); }
    10% { opacity: 0.9; }
    90% { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(280px) translateX(var(--drift, 10px)); }
  }

  /* Music notes */
  .note {
    position: absolute;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    animation: noteBounce var(--dur, 2.5s) var(--delay, 0s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes noteBounce {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.8); }
    30% { opacity: 1; transform: translateY(-15px) scale(1.1); }
    70% { opacity: 0.8; transform: translateY(-25px) scale(1); }
  }

  /* Question mark box */
  .question-box {
    position: absolute;
    bottom: -10px;
    right: -8px;
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #ff85c8, #ff4dac);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    color: white;
    box-shadow: 0 4px 16px rgba(255,77,172,0.4);
    animation: questionJump 1.5s ease-in-out infinite;
    z-index: 5;
  }
  @keyframes questionJump {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }

  /* Headline */
  .headline {
    text-align: center;
    margin: 22px 0 18px;
    animation: fadeUp 0.8s 0.4s ease both;
  }
  .headline h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 38px;
    color: white;
    line-height: 1.1;
    letter-spacing: -1px;
  }
  .headline h1 span {
    background: linear-gradient(135deg, #ff85c8, #ff4dac, #c471ed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: colorShift 3s ease-in-out infinite;
  }
  @keyframes colorShift {
    0%, 100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(30deg); }
  }

  /* CTA Button */
  .cta-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #ff85c8, #ff4dac);
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: #1a0a2e;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s 0.6s ease both, ctaPulse 2.5s 1.5s ease-in-out infinite;
    box-shadow: 0 8px 30px rgba(255,77,172,0.4);
  }
  @keyframes ctaPulse {
    0%, 100% { box-shadow: 0 8px 30px rgba(255,77,172,0.4); transform: scale(1); }
    50% { box-shadow: 0 12px 40px rgba(255,77,172,0.7); transform: scale(1.02); }
  }
  .cta-btn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: rgba(255,255,255,0.3);
    transform: skewX(-20deg);
    animation: shimmer 3s 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 130%; }
  }

  /* Anon text */
  .anon {
    text-align: center;
    margin-top: 14px;
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    animation: fadeUp 0.8s 0.8s ease both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* Keyframes */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- Background sparkles (JS injected) -->

  <!-- Logo -->
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
      <path d="M20 4 C20 4 28 10 28 20 C28 28 20 36 20 36" stroke="#ff85c8" stroke-width="3" stroke-linecap="round"/>
      <path d="M20 4 C20 4 12 10 12 20 C12 28 20 36 20 36" stroke="#c471ed" stroke-width="3" stroke-linecap="round"/>
      <path d="M8 15 C14 12 26 12 32 15" stroke="#ff4dac" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M8 25 C14 28 26 28 32 25" stroke="#c471ed" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="3" fill="#ff85c8"/>
    </svg>
    <span class="logo-text">Kiid AI</span>
  </div>

  <!-- Free Badge -->
  <div class="free-badge">
    <span>100%<br>FREE</span>
  </div>

  <!-- Seasons -->
  <div class="seasons" id="seasons">

    <!-- Summer -->
    <div class="season-panel summer" id="summer">
      <div class="season-label">SUMMER</div>
      <div style="flex:1; background: linear-gradient(180deg, #87ceeb 0%, #ffd6e7 60%, #98d982 100%); position:relative; display:flex; align-items:flex-end; justify-content:center; overflow:hidden;">
        <!-- Flowers -->
        <div style="position:absolute; bottom:0; width:100%; height:100%; display:flex; align-items:flex-end; justify-content:center;">
          <!-- Girl silhouette summer -->
          <div style="width:68px; height:160px; background:linear-gradient(180deg,#f5c5a0 0%,#f5c5a0 15%,#f7d44e 16%,#f7d44e 55%,#f5c5a0 56%,#f5c5a0 100%); border-radius:8px 8px 0 0; position:relative; margin-bottom:0;">
            <div style="width:22px;height:22px;background:#f5c5a0;border-radius:50%;position:absolute;top:-24px;left:50%;transform:translateX(-50%);"></div>
            <!-- Hat -->
            <div style="width:30px;height:8px;background:#d4a832;border-radius:50%;position:absolute;top:-38px;left:50%;transform:translateX(-50%);"></div>
          </div>
        </div>
        <!-- Floating flowers -->
        <span class="particle" style="left:5px;bottom:40px;--dur:2.8s;--delay:0s;">🌸</span>
        <span class="particle" style="left:15px;bottom:20px;--dur:3.2s;--delay:0.5s;">🌺</span>
        <span class="particle" style="right:5px;bottom:50px;--dur:2.5s;--delay:1s;">🌼</span>
        <span class="note" style="left:4px;top:20px;--dur:2.2s;--delay:0.3s;">♪</span>
        <span class="note" style="right:4px;top:30px;--dur:2.8s;--delay:0.8s;">♫</span>
      </div>
    </div>

    <!-- Fall -->
    <div class="season-panel fall" id="fall">
      <div class="season-label" style="color:#fff5e0;">FALL</div>
      <div style="flex:1; background:linear-gradient(180deg,#d4916a 0%,#e07b3a 50%,#c85a1e 100%); position:relative; display:flex; align-items:flex-end; justify-content:center; overflow:hidden;">
        <div style="width:60px; height:155px; background:linear-gradient(180deg,#f5c5a0 0%,#f5c5a0 18%,#8b6914 19%,#8b6914 52%,#7a4e12 53%,#7a4e12 100%); border-radius:6px 6px 0 0; position:relative;">
          <div style="width:20px;height:20px;background:#f5c5a0;border-radius:50%;position:absolute;top:-22px;left:50%;transform:translateX(-50%);"></div>
        </div>
        <!-- Falling leaves -->
        <span class="particle" style="left:8px;bottom:30px;--dur:2.4s;--delay:0.2s;">🍂</span>
        <span class="particle" style="right:6px;bottom:45px;--dur:3s;--delay:0.7s;">🍁</span>
        <span class="particle" style="left:18px;bottom:60px;--dur:2.7s;--delay:1.2s;">🍂</span>
        <span class="note" style="left:4px;top:18px;--dur:2.5s;--delay:0.1s;">♩</span>
        <span class="note" style="right:3px;top:28px;--dur:2s;--delay:0.9s;">♪</span>
      </div>
    </div>

    <!-- Winter -->
    <div class="season-panel winter" id="winter">
      <div class="season-label">WINTER</div>
      <div style="flex:1; background:linear-gradient(180deg,#b8d9f0 0%,#daeef9 50%,#f0f8ff 100%); position:relative; display:flex; align-items:flex-end; justify-content:center; overflow:hidden;">
        <div style="width:62px; height:162px; background:linear-gradient(180deg,#f5c5a0 0%,#f5c5a0 16%,#c8c8c8 17%,#c8c8c8 100%); border-radius:6px 6px 0 0; position:relative;">
          <div style="width:20px;height:20px;background:#f5c5a0;border-radius:50%;position:absolute;top:-24px;left:50%;transform:translateX(-50%);"></div>
          <!-- Beanie -->
          <div style="width:26px;height:14px;background:#e8d5b0;border-radius:10px 10px 0 0;position:absolute;top:-36px;left:50%;transform:translateX(-50%);"></div>
          <div style="width:10px;height:10px;background:#e8d5b0;border-radius:50%;position:absolute;top:-44px;left:50%;transform:translateX(-50%);"></div>
        </div>
        <!-- Snowflakes -->
        <span class="snowflake" style="left:10px;--dur:2.5s;--delay:0s;--drift:5px;">❄</span>
        <span class="snowflake" style="left:30px;--dur:3s;--delay:0.8s;--drift:-8px;">❄</span>
        <span class="snowflake" style="right:8px;--dur:2.2s;--delay:0.4s;--drift:6px;">❅</span>
        <span class="snowflake" style="left:50px;--dur:3.5s;--delay:1.2s;--drift:-5px;">❆</span>
        <span class="note" style="left:4px;top:18px;--dur:3s;--delay:0.5s;color:rgba(100,160,220,0.9);">♫</span>
        <span class="note" style="right:3px;top:26px;--dur:2.6s;--delay:1s;color:rgba(100,160,220,0.9);">♪</span>
      </div>
    </div>

    <!-- Question mark -->
    <div class="question-box">?</div>
  </div>

  <!-- Headline -->
  <div class="headline">
    <h1>What's Your<br><span>Color Season?</span></h1>
  </div>

  <!-- CTA -->
  <button class="cta-btn">✨ Free Download</button>

  <!-- Anon -->
  <div class="anon">
    <span>🔒</span>
    <span>100% anonymous, always</span>
  </div>

</div>

<script>
  // Inject background sparkles
  const card = document.getElementById('card');
  const colors = ['#ff85c8','#c471ed','#ff4dac','#ffffff','#ffd6e7'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = Math.random() * 4 + 2;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${1.5 + Math.random()*2.5}s;
      animation-delay:${Math.random()*3}s;
    `;
    card.insertBefore(s, card.firstChild);
  }
</script>

</body>
</html>
